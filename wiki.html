<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wiki</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" crossorigin="anonymous" href="https://core.ontavio.de/font-awesome/6.4.0/css/all.min.css"/>
    <script src="wiki.js" type="module" defer></script>
</head>
<body>
<div class="wiki-page">
    <button id="go-back-button" onclick='window.location = "index.html"'>Go Back</button>
    <div class="wiki-role-div">
        <label for="wiki-role-selection">Select Role</label>
        <select id="wiki-role-selection"></select>
        <div id="wiki-role-container">
            <div id="wiki-role-name"></div>
            <div id="wiki-role-team"></div>
            <div id="wiki-role-description"></div>
            <div id="wiki-role-night-action"></div>
            <div id="wiki-role-night-action-detailed"></div>
        </div>
    </div>
    <div style="margin-top: 20px">
        <a href="https://cdn.1j1ju.com/medias/0d/2e/7b-one-night-ultimate-werewolf-rulebook.pdf" target="_blank">Detailed Rulebook</a>
    </div>
</div>
</body>
</html>
